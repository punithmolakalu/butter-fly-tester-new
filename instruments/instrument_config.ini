# Instrument configuration (optional).
# Connection addresses: set here and/or in [Connection] for all devices to load when app opens.
# Use Save in the Connection tab to write to saved_connections.ini (overrides these for next run).
#
# Simulation — software instruments (no serial/GPIB/VISA/Kinesis where applicable).
#
# A) Everything simulated:  simulate_all = 1   OR   BF_SIMULATE_ALL=1
#
# B) **PRM + Thorlabs + Gentec = REAL**; Arroyo, Actuator, Ando, Wavemeter = SIM (typical bench):
#      simulate_except_measurement = 1   OR   BF_SIMULATE_EXCEPT_MEASUREMENT=1
#    Simulated slots auto-connect ~0.5s after startup (footer: "Connected (simulation)").
#    Connect real COM/VISA/Kinesis yourself for Gentec, Thorlabs, PRM. Do not set simulate_all = 1 with B.
#
# C) À la carte: simulate_all off, simulate_except_measurement off, then e.g. simulate_arroyo = 1
#
[Simulation]
# simulate_except_measurement = 1
# simulate_all = 1
# simulate_arroyo = 1
# simulate_actuator = 1
# simulate_prm = 1
# simulate_gentec = 1
# simulate_thorlabs = 1
# simulate_ando = 1
# simulate_wavemeter = 1

[Connection]
arroyo_port = COM5
# actuator_port = COM4
# ando_gpib = GPIB0::5::INSTR
# wavemeter_gpib = GPIB0::6::INSTR
# prm_serial =
# gentec_port = COM5
# thorlabs_visa = USB0::0x1313::0x8072::1930456::INSTR

[Arroyo]
port = COM5

[Actuators]
# port = COM4

[Gentec]
# port = COM5

[Thorlabs_Powermeter]
# Set enabled = 1 when using resource from this file (not required when passing VISA string from UI)
enabled = 1
# Example (this PC): Thorlabs PM100D over USB
resource = USB0::0x1313::0x8072::1930456::INSTR

# PRM: KCube DC Motor Controller — use serial number from Thorlabs Kinesis device list.
[PRM]
# Serial from Kinesis device list (use Connection → Scan PRM if this does not match your hardware)
serial_number = 27253257
